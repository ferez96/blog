<!doctype html>
<html lang="{{ .Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  {{ with .OutputFormats.Get "rss" }}
    {{ printf `<link rel=%q type=%q href=%q title=%q>` .Rel .MediaType.Type .Permalink site.Title | safeHTML }}
  {{ end }}
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <header class="border-bottom bg-white shadow-sm">
    <div class="container py-3 d-flex align-items-center">
      <a class="fw-bold text-dark text-decoration-none" href="{{ .Site.Home.RelPermalink }}">{{ site.Title }}</a>
      <div class="ms-auto d-flex gap-2">
        {{ range .AllTranslations }}
        <a class="btn btn-sm {{ if eq .Language.Lang $.Site.Language.Lang }}btn-secondary{{ else }}btn-outline-secondary{{ end }}"
           href="{{ .Permalink }}">{{ .Language.LanguageName }}</a>
        {{ end }}
      </div>
    </div>
  </header>
  <main class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        {{ block "main" . }}{{ end }}
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: true });
    }
  </script>
</body>
</html>
